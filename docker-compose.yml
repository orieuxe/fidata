services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: fidata
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgrest:
    image: postgrest/postgrest:v12.2.12
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/fidata
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: web_anon
      PGRST_LOG_LEVEL: info

  web:
    build: ./web
    restart: unless-stopped
    depends_on:
      - postgrest
    environment:
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE}
      NUXT_API_BASE_SERVER: ${NUXT_API_BASE_SERVER:-${NUXT_PUBLIC_API_BASE}}

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - web
      - postgrest
    environment:
      DOMAIN: ${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

  # One-shot: `docker compose run --rm scraper`, wired up by the systemd
  # timer in deploy/fidata-scraper.timer -- not part of the always-on stack.
  scraper:
    build: ./scraper
    profiles: ["cron"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/fidata

volumes:
  pgdata:
  caddy_data:
  caddy_config:
