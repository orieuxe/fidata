services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: fidata
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgrest:
    image: postgrest/postgrest:v12.2.12
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/fidata
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: web_anon
      PGRST_LOG_LEVEL: info

  web:
    build: ./web
    restart: unless-stopped
    depends_on:
      - postgrest
    environment:
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE}
      NUXT_API_BASE_SERVER: ${NUXT_API_BASE_SERVER:-${NUXT_PUBLIC_API_BASE}}
    volumes:
      - web_static:/srv/web:ro

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - web
      - postgrest
    environment:
      DOMAIN: ${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

  # One-shot: `docker compose run --rm scraper`, wired up by the systemd
  # timer in deploy/fidata-scraper.timer -- not part of the always-on stack.
  scraper:
    build: ./scraper
    profiles: ["cron"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/fidata

  # One-shot: `docker compose run --rm migrate`, called by deploy/fidata-deploy.sh
  # -- runs any un-executed committed migrations against the running DB.
  migrate:
    build: ./db
    profiles: ["cron"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/fidata

  # One-shot: `docker compose run --rm web-generate`, called by
  # deploy/fidata-deploy.sh (code changes) and fidata-scraper.service (data
  # changes) -- (re)builds the static site into `web_static`, which `web`
  # serves. No restart of `web` needed: Caddy reads the volume from disk.
  web-generate:
    build:
      context: ./web
      target: build
    profiles: ["cron"]
    depends_on:
      - postgrest
    environment:
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE}
      NUXT_API_BASE_SERVER: ${NUXT_API_BASE_SERVER:-${NUXT_PUBLIC_API_BASE}}
    # Generate into the image's own filesystem, not straight into the
    # volume: nitro rmdir's its output dir before writing it, and a mounted
    # volume can't be rmdir'd (EBUSY) -- only its contents can be replaced.
    command: sh -c "npm run generate && rm -rf /web_static/* && cp -a .output/public/. /web_static/"
    volumes:
      - web_static:/web_static

volumes:
  pgdata:
  caddy_data:
  caddy_config:
  web_static:
